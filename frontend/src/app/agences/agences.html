<div class="container mt-4">

  <!-- Header row -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">
      <i class="bi bi-building me-2 text-primary"></i>Agences
    </h2>
    <div class="d-flex gap-2 align-items-center">
      <form [formGroup]="searchFormGroup" (ngSubmit)="handleSearchAgences()" class="d-flex gap-2">
        <input type="text" formControlName="keyword" class="form-control" placeholder="Rechercher...">
        <button class="btn btn-outline-primary">
          <i class="bi bi-search"></i>
        </button>
      </form>
      <a routerLink="/new-agence" class="btn btn-primary text-nowrap">
        <i class="bi bi-plus-circle me-1"></i>Nouvelle Agence
      </a>
    </div>
  </div>

  <!-- Data table -->
  <ng-container *ngIf="agences | async as list; else failureOrLoading">
    <div class="card">
      <div class="card-body p-0">
        <table class="table table-hover table-striped mb-0">
          <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>Nom</th>
              <th>Adresse</th>
              <th>Ville</th>
              <th>Téléphone</th>
              <th class="text-center">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let a of list; let i = index">
              <td>{{ i + 1 }}</td>
              <td class="fw-semibold">{{ a.nom }}</td>
              <td>{{ a.adresse }}</td>
              <td>{{ a.ville }}</td>
              <td>{{ a.telephone }}</td>
              <td class="text-center">
                <!-- Edit -->
                <a [routerLink]="['/edit-agence', a.id]" class="btn btn-sm btn-warning btn-action me-1" title="Modifier">
                  <i class="bi bi-pencil"></i>
                </a>
                <!-- Delete -->
                <button class="btn btn-sm btn-danger btn-action" title="Supprimer"
                        (click)="handleDeleteAgence(a)">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="list.length === 0">
              <td colspan="6" class="text-center text-muted py-4">Aucune agence trouvée.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </ng-container>

  <!-- Loading / Error -->
  <ng-template #failureOrLoading>
    <ng-container *ngIf="errorMessage; else loading">
      <div class="alert alert-danger">
        <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMessage }}
      </div>
    </ng-container>
    <ng-template #loading>
      <div class="text-center py-5 text-muted">
        <div class="spinner-border me-2" role="status"></div>
        Chargement...
      </div>
    </ng-template>
  </ng-template>

</div>
